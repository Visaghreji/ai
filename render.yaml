      - key: OPENAI_MODEL_NAME
        value: gemini-1.5-flash
      - key: TAVILY_API_KEY
        value: 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
