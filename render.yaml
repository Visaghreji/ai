services:
  - type: web
    name: lex-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_BASE
        value: https://generativelanguage.googleapis.com/v1beta/openai/
